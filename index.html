<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colorfly Studio</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>
   <header>
     <h1>Colorfly Studio</h1>     
     <h3>Generador de paletas de colores</h3>
     <p>Pulsa el botón para obtener distintos colores</p>
     
     <div>
       <label for="tamaño">Tamaño de paleta:</label>
       <select id="tamaño">
         <option value="6">6 colores</option>
         <option value="8">8 colores</option>
         <option value="9" selected>9 colores</option>
       </select>

       <label for="formato">Formato:</label>
       <select id="formato">
         <option value="hex" selected>HEX</option>
         <option value="hsl">HSL</option>
       </select>
     </div>
     
     <button id="btn">Generar paleta</button>

     <div id = "contenedor">
       <div class = "cuadrado" ></div>
       <div class = "cuadrado" ></div>
       <div class = "cuadrado" ></div>
       <div class = "cuadrado" ></div>
       <div class = "cuadrado" ></div>
       <div class = "cuadrado" ></div>
       <div class = "cuadrado" ></div>
       <div class = "cuadrado" ></div>
       <div class = "cuadrado" ></div>
     </div>
   </header>
    
  <script src="./main.js"></script>
</body>

</html>
